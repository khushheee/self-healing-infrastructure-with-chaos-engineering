apiVersion: argoproj.io/v1alpha1

kind: Application

metadata:

  name: self-healing

  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/khushheee/self-healing-infrastructure.git

    targetRevision: HEAD

    path: kubernetes/base

  destination:

    server: https://kubernetes.default.svc

    namespace: self-healing

  syncPolicy:

    automated:

      prune: true

      selfHeal: true
